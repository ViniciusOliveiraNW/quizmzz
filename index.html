<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz — Plataforma de Atendimento</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0f;
      --surface:   #16161a;
      --border:    #2a2a32;
      --accent:    #e8ff47;
      --accent2:   #ff6b35;
      --text:      #f0eff4;
      --muted:     #6b6b7a;
      --card-open: #1c1e14;
      --modal-bg:  #13131a;
      --radius:    12px;
      --font-title: 'Bebas Neue', sans-serif;
      --font-body:  'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.3;
    }

    /* ─── Header ─── */
    header {
      position: relative;
      z-index: 1;
      padding: 52px 48px 28px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .header-label {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      color: var(--accent);
      background: rgba(232,255,71,0.08);
      border: 1px solid rgba(232,255,71,0.25);
      border-radius: 4px;
      padding: 4px 10px;
      margin-bottom: 14px;
    }

    header h1 {
      font-family: var(--font-title);
      font-size: clamp(2.8rem, 6vw, 5rem);
      line-height: 0.95;
      letter-spacing: 0.02em;
    }

    header h1 em {
      font-style: normal;
      color: var(--accent);
    }

    .header-sub {
      margin-top: 12px;
      font-size: 0.9rem;
      font-weight: 300;
      color: var(--muted);
    }

    .progress-bar-wrap {
      margin-top: 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .progress-track {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(.4,0,.2,1);
    }

    .progress-text {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--muted);
      white-space: nowrap;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ─── Grid ─── */
    main {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 8px 48px 80px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 12px;
    }

    /* ─── Card ─── */
    .card {
      aspect-ratio: 3 / 4;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      position: relative;
      overflow: hidden;
      transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), border-color 0.2s, box-shadow 0.2s;
      animation: cardIn 0.45s both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.93); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(232,255,71,0.07) 0%, transparent 65%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover { transform: translateY(-6px) scale(1.04); border-color: rgba(232,255,71,0.4); box-shadow: 0 14px 40px rgba(0,0,0,0.55); }
    .card:hover::before { opacity: 1; }
    .card:active { transform: translateY(-2px) scale(0.99); }

    .card-number {
      font-family: var(--font-title);
      font-size: 3rem;
      line-height: 1;
      color: var(--text);
      transition: color 0.2s;
      position: relative;
      z-index: 1;
    }

    .card-hint {
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      position: relative;
      z-index: 1;
    }

    /* Opened state */
    .card.opened {
      background: var(--card-open);
      border-color: rgba(232,255,71,0.45);
    }

    .card.opened .card-number { color: var(--accent); }
    .card.opened .card-hint   { color: rgba(232,255,71,0.45); }

    .card.opened::after {
      content: '✓';
      position: absolute;
      top: 8px;
      right: 10px;
      font-size: 0.62rem;
      color: var(--accent);
      font-family: var(--font-body);
      font-weight: 600;
    }

    /* ─── Overlay ─── */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.78);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .overlay.active { opacity: 1; pointer-events: all; }

    /* ─── Modal ─── */
    .modal {
      background: var(--modal-bg);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
      border-radius: 16px;
      max-width: 560px;
      width: 100%;
      padding: 48px 48px 40px;
      position: relative;
      transform: translateY(28px) scale(0.96);
      transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
      box-shadow: 0 40px 80px rgba(0,0,0,0.7);
    }

    .overlay.active .modal { transform: translateY(0) scale(1); }

    .modal-number {
      font-family: var(--font-title);
      font-size: 5rem;
      line-height: 1;
      color: var(--accent);
      margin-bottom: 18px;
    }

    .modal-question {
      font-size: 1.05rem;
      font-weight: 400;
      line-height: 1.75;
      color: var(--text);
      white-space: pre-line;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 18px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 1rem;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .modal-close:hover { border-color: var(--accent2); color: var(--accent2); background: rgba(255,107,53,0.08); }

    /* ─── Responsive ─── */
    @media (max-width: 600px) {
      header, main { padding-left: 18px; padding-right: 18px; }
      header { padding-top: 32px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 9px; }
      .modal { padding: 36px 22px 28px; }
      .modal-number { font-size: 3.8rem; }
    }
  </style>
</head>
<body>

<div class="bg-grid"></div>

<header>
  <div class="header-inner">
    <span class="header-label">QUIZ</span>
    <h1>Plataforma de<br><em>Atendimento</em></h1>
    <p class="header-sub">Selecione uma carta para revelar a pergunta</p>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <span class="progress-text" id="progressText">0 / 20 abertas</span>
  </div>
</header>

<main>
  <div class="grid" id="cardGrid"></div>
</main>

<div class="overlay" id="overlay" aria-hidden="true">
  <div class="modal" id="modal" role="dialog" aria-modal="true">
    <div class="modal-number" id="modalNumber"></div>
    <p class="modal-question" id="modalQuestion"></p>
    <button class="modal-close" id="modalClose" aria-label="Fechar">&#x2715;</button>
  </div>
</div>

<script>
  const questions = [
    "Você acabou de logar na plataforma, mas não está conseguindo visualizar os atendimentos. O que pode estar acontecendo?",
    "Um novo cliente entrou em contato. Quais informações e quais ações você consegue realizar no dashboard nesse momento?",
    "Um cliente entrou pelo Instagram. Você pode criar um chamado ativo?",
    "Você adicionou outro atendente como participante. O que ele NÃO pode fazer?",
    "Cite algumas métricas do dashboard.",
    "Qual o período máximo para exportar relatórios?",
    "Por que os departamentos são importantes?",
    "Em que situação o bot envia a mensagem de \"atendentes ausentes\"?",
    "Qual a relação entre horário geral, departamento e atendente?",
    "Situação: O cliente diz que já falou com outro atendente ontem, mas o chat está vazio para você.\n\nIsso é erro do sistema ou configuração?",
    "Situação: O atendente marcou um card como \"perdido\" e diz que ele foi apagado.\n\nIsso realmente acontece?",
    "Situação: Atendente finalizou card, mas não apareceu motivo de perda.\n\nPor quê?",
    "Situação: Gestor não consegue ver métricas claras de vendas.\n\nO que pode estar faltando?",
    "Situação: Você criou um card pelo atendimento, mas ele não aparece no board esperado.\n\nO que pode ter acontecido?",
    "Departamento existe, mas não recebe nenhum cliente. O que pode estar errado?",
    "O número foi banido. Quais procedimentos devem ser realizados?",
    "O que são templates?",
    "Como é feita a abertura dos atendimentos e por quais canais posso realizar?",
    "Quais relatórios o atendente tem acesso?",
    "Quais funções o gestor e o supervisor não têm acesso na plataforma?"
  ];

  const STORAGE_KEY = 'quiz_opened_v1';

  function getOpened() {
    try { return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY)) || []); }
    catch { return new Set(); }
  }

  function saveOpened(set) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...set])); } catch {}
  }

  const openedCards = getOpened();

  const grid          = document.getElementById('cardGrid');
  const overlay       = document.getElementById('overlay');
  const modalNumber   = document.getElementById('modalNumber');
  const modalQuestion = document.getElementById('modalQuestion');
  const modalClose    = document.getElementById('modalClose');
  const progressFill  = document.getElementById('progressFill');
  const progressText  = document.getElementById('progressText');

  // Build cards
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.classList.add('card');
    card.dataset.index = i;
    if (openedCards.has(i)) card.classList.add('opened');
    card.style.animationDelay = (i * 35) + 'ms';
    card.innerHTML = `
      <span class="card-number">${String(i + 1).padStart(2, '0')}</span>
      <span class="card-hint">Pergunta</span>
    `;
    card.addEventListener('click', () => openModal(i));
    grid.appendChild(card);
  });

  updateProgress();

  function openModal(index) {
    modalNumber.textContent   = String(index + 1).padStart(2, '0');
    modalQuestion.textContent = questions[index];
    overlay.classList.add('active');
    overlay.setAttribute('aria-hidden', 'false');

    if (!openedCards.has(index)) {
      openedCards.add(index);
      saveOpened(openedCards);
      const card = grid.querySelector(`[data-index="${index}"]`);
      if (card) card.classList.add('opened');
      updateProgress();
    }
  }

  function closeModal() {
    overlay.classList.remove('active');
    overlay.setAttribute('aria-hidden', 'true');
  }

  function updateProgress() {
    const pct = (openedCards.size / questions.length) * 100;
    progressFill.style.width = pct + '%';
    progressText.textContent = `${openedCards.size} / ${questions.length} abertas`;
  }

  modalClose.addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>

</body>
</html>
